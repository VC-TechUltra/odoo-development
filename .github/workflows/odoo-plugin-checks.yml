name: odoo-plugin-checks

on:
  push:
    paths:
      - 'plugins/odoo-development/**'
      - '.github/workflows/odoo-plugin-checks.yml'
  pull_request:
    paths:
      - 'plugins/odoo-development/**'
      - '.github/workflows/odoo-plugin-checks.yml'

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: plugins/odoo-development

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run local checks (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/run-local-checks.sh

      - name: Run local checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/run-local-checks.ps1

      - name: Export health report
        if: always()
        run: |
          python ./scripts/export_health_report.py \
            --offline \
            --strict-local \
            --output ./artifacts/health-${{ runner.os }}-py${{ matrix.python-version }}.json

      - name: Upload health report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-${{ runner.os }}-py${{ matrix.python-version }}
          path: plugins/odoo-development/artifacts/health-${{ runner.os }}-py${{ matrix.python-version }}.json
